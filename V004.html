<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Azeff | Abstract Device</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #e0e0e0;
            --panel: rgba(8, 8, 8, 0.85);
            --panel-border: #1a1a1a;
            --pad-off: #0a0a0a;
            --pad-on: #151515;
            --pad-border: #111111;
            --fader-track: #050505;
            --fader-thumb: #cccccc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            touch-action: none; /* Prevents iOS pull-to-refresh & swiping */
        }

        /* Extreme Grain Overlay */
        .noise {
            position: fixed;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            width: 200vw; height: 200vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.85;
            mix-blend-mode: overlay;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            animation: grain 0.15s steps(2) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            30% { transform: translate(3%, -15%); }
            50% { transform: translate(12%, 9%); }
            70% { transform: translate(9%, 4%); }
            90% { transform: translate(-1%, 7%); }
        }

        /* Logo */
        header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            mix-blend-mode: difference;
        }

        header img {
            width: 45px;
            height: auto;
            filter: contrast(200%) grayscale(100%);
        }

        /* --- FULLSCREEN VOID CANVAS --- */
        .void-space {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            overflow: hidden;
            z-index: 1;
        }

        .monolith {
            position: absolute;
            width: 2px; height: 0vh;
            background: var(--fg);
            box-shadow: 0 0 30px var(--fg);
            transition: height 0.1s ease-out, transform 0.1s ease-out;
            z-index: 5;
        }

        .shard-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .shard {
            position: absolute;
            background: var(--fg);
            opacity: 0;
            transform-origin: center;
            mix-blend-mode: difference;
            transition: opacity 0.2s, transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .halo {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 400px; height: 400px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            box-shadow: inset 0 0 80px rgba(255, 255, 255, 0.05);
            transition: all 0.2s ease-out;
            z-index: 2;
        }

        .strobe-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fg);
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            mix-blend-mode: exclusion;
        }

        /* --- FLOATING CONTROL PANEL (Novation / Brutalist Vibe) --- */
        .device-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: var(--panel);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--panel-border);
            padding: 20px;
            border-radius: 6px;
            display: flex;
            gap: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.05);
        }

        /* Pad Matrix Section */
        .matrix {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            align-content: center;
        }

        .pad {
            width: 50px; height: 50px;
            background: var(--pad-off);
            border: 1px solid var(--pad-border);
            border-radius: 4px;
            color: #222;
            font-size: 0.5rem;
            font-family: monospace;
            text-transform: uppercase;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        /* Active functional pads */
        .pad.active {
            color: #888;
            background: var(--pad-on);
            border-color: #333;
            cursor: pointer;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.02);
        }

        .pad.active:hover {
            background: #1f1f1f;
            color: #aaa;
            border-color: #555;
        }

        .pad.active:active {
            background: var(--fg);
            color: var(--bg);
            box-shadow: 0 0 15px var(--fg);
        }

        /* Fader Section */
        .fader-module {
            width: 70px;
            background: #060606;
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.8);
        }

        /* Custom Cross-browser Rotated Fader without blue highlights */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 180px; /* Represents physical height due to rotation */
            height: 60px; /* Represents touch target width */
            background: transparent;
            transform: rotate(-90deg);
            outline: none !important;
            margin: 0;
        }

        input[type="range"]:focus, input[type="range"]:active {
            outline: none !important;
        }

        /* Thick Fader Track */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 16px; 
            background: var(--fader-track);
            border: 1px solid #1a1a1a;
            border-radius: 1px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,1);
        }

        input[type="range"]::-moz-range-track {
            width: 100%; height: 16px; 
            background: var(--fader-track);
            border: 1px solid #1a1a1a;
            border-radius: 1px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,1);
        }

        /* Brutalist Fader Thumb */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 40px; 
            width: 30px; 
            background: var(--fader-thumb);
            border: 2px solid #000;
            border-radius: 2px;
            margin-top: -13px; /* Centers thumb on the 16px track */
            box-shadow: 0 4px 10px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.8);
            cursor: ns-resize;
        }

        input[type="range"]::-moz-range-thumb {
            height: 40px; width: 30px; 
            background: var(--fader-thumb);
            border: 2px solid #000;
            border-radius: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.8);
            cursor: ns-resize;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .device-panel {
                bottom: 25px;
                padding: 15px;
                gap: 15px;
                width: 90vw;
                justify-content: space-between;
            }
            .matrix {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
                flex: 1;
            }
            .pad { width: 100%; height: 45px; }
            .fader-module { width: 60px; }
            input[type="range"] { width: 160px; }
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <header><img src="AZEFF_Icon-White.png" alt="AZEFF Logo"></header>

    <div class="void-space" id="voidSpace">
        <div class="strobe-flash" id="strobe"></div>
        <div class="halo" id="halo1"></div>
        <div class="halo" id="halo2"></div>
        <div class="monolith" id="monolith"></div>
        <div class="shard-container" id="shardField"></div>
    </div>

    <div class="device-panel">
        <div class="matrix" id="pad-matrix">
            </div>
        
        <div class="fader-module">
            <input type="range" id="sizeFader" min="0" max="100" value="0">
        </div>
    </div>

    <script>
        const fader = document.getElementById('sizeFader');
        const monolith = document.getElementById('monolith');
        const shardField = document.getElementById('shardField');
        const halo1 = document.getElementById('halo1');
        const halo2 = document.getElementById('halo2');
        const strobe = document.getElementById('strobe');
        const matrix = document.getElementById('pad-matrix');

        const NUM_SHARDS = 50;
        const SHARDS = [];

        function initDevice() {
            // Adjust matrix size based on screen to keep Launchpad vibe
            const isMobile = window.innerWidth <= 600;
            const NUM_PADS = isMobile ? 12 : 16; 
            
            const activeActions = [
                { text: "LOG", act: () => alert("AUTH_SEQ_INIT") },
                { text: "NFO", act: () => alert("SYS_DATA_READ") },
                { text: "CNT", act: () => alert("UPLINK_ESTAB") }
            ];
            
            let activePlaced = 0;

            for(let i = 0; i < NUM_PADS; i++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                
                // Randomly assign the 3 functional keys towards the bottom
                if (i >= NUM_PADS - 6 && activePlaced < 3 && Math.random() > 0.3) {
                    pad.classList.add('active');
                    pad.innerText = activeActions[activePlaced].text;
                    // Add slight touch feedback delay for iOS
                    pad.addEventListener('touchstart', (e) => {
                        e.preventDefault(); 
                        activeActions[activePlaced].act();
                    });
                    pad.onclick = activeActions[activePlaced].act; // Desktop fallback
                    activePlaced++;
                } else {
                    const symbols = ["+", "-", "·", "::", "||", "x", ""];
                    pad.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                }
                matrix.appendChild(pad);
            }
            
            // Fallback if random placement missed them
            while(activePlaced < 3) {
                const pad = document.createElement('div');
                pad.className = 'pad active';
                pad.innerText = activeActions[activePlaced].text;
                pad.onclick = activeActions[activePlaced].act;
                pad.addEventListener('touchstart', (e) => { e.preventDefault(); activeActions[activePlaced].act(); });
                matrix.appendChild(pad);
                activePlaced++;
            }
        }

        function initArt() {
            for (let i = 0; i < NUM_SHARDS; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                
                const isLine = Math.random() > 0.6;
                const w = isLine ? (Math.random() * 3 + 1) : (Math.random() * 150 + 20);
                const h = isLine ? (Math.random() * 300 + 100) : (Math.random() * 150 + 20);
                
                shard.style.width = `${w}px`;
                shard.style.height = `${h}px`;
                
                shard.dataset.angle = Math.random() * Math.PI * 2;
                shard.dataset.dist = Math.random() * 30 + 5; 
                shard.dataset.rot = Math.random() * 360;
                
                shardField.appendChild(shard);
                SHARDS.push(shard);
            }
        }

        function updateArtPhysics() {
            const val = parseInt(fader.value);
            const norm = val / 100;

            // 1. Monolith
            monolith.style.height = `${norm * 100}vh`;
            const thickness = val === 100 ? 150 : (2 + norm * 15);
            monolith.style.width = `${thickness}px`;

            // 2. Halos
            halo1.style.transform = `translate(-50%, -50%) scale(${norm * 2.5}) rotate(${norm * 180}deg)`;
            halo1.style.opacity = norm > 0.05 ? 1 - norm : 0;
            halo2.style.transform = `translate(-50%, -50%) scale(${norm * 4}) rotate(${-norm * 90}deg)`;
            halo2.style.opacity = norm > 0.2 ? (1 - norm) * 0.6 : 0;

            // 3. Shard Explosion
            const activeThreshold = Math.floor(norm * NUM_SHARDS);
            SHARDS.forEach((shard, i) => {
                if (i < activeThreshold) {
                    shard.style.opacity = (Math.random() * 0.6 + 0.1) * norm;
                    const expand = parseFloat(shard.dataset.dist) + (norm * 45);
                    const tx = Math.cos(shard.dataset.angle) * expand;
                    const ty = Math.sin(shard.dataset.angle) * expand;
                    const r = parseFloat(shard.dataset.rot) + (norm * 270);
                    shard.style.transform = `translate(${tx}vw, ${ty}vh) rotate(${r}deg) scale(${norm * 2 + 0.5})`;
                } else {
                    shard.style.opacity = 0;
                    shard.style.transform = `translate(0,0) scale(0)`;
                }
            });

            // 4. Strobe Chaos
            if (norm > 0.85) {
                const flicker = Math.random() > 0.4 ? (norm - 0.75) * 4 : 0;
                strobe.style.opacity = flicker;
                document.getElementById('voidSpace').style.backgroundColor = Math.random() > 0.85 ? '#0a0a0a' : '#000';
            } else {
                strobe.style.opacity = 0;
                document.getElementById('voidSpace').style.backgroundColor = '#000';
            }
        }

        // Initialize UI & Canvas
        initDevice();
        initArt();
        
        // Fader Control Binding
        fader.addEventListener('input', updateArtPhysics);
        updateArtPhysics();

        // Screen Swipe controls for iOS (Swiping the void area adjusts the fader)
        let touchStartY = 0;
        const voidArea = document.getElementById('voidSpace');
        
        voidArea.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        voidArea.addEventListener('touchmove', e => {
            let touchEndY = e.touches[0].clientY;
            let diff = touchStartY - touchEndY;
            
            if (Math.abs(diff) > 4) {
                let newVal = parseInt(fader.value) + (diff * 0.5);
                newVal = Math.max(0, Math.min(100, newVal));
                fader.value = newVal;
                updateArtPhysics();
                touchStartY = touchEndY; 
            }
        }, {passive: true});
        
    </script>
</body>
</html>
