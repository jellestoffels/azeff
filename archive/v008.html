<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Azeff | Abstract Device</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #e0e0e0;
            --grad-1: #ffffff;
            --grad-2: #666666;
            --glow-color: rgba(255, 255, 255, 0.4);
            
            --panel: rgba(10, 10, 10, 0.85);
            --panel-border: #1a1a1a;
            --pad-off: #0a0a0a;
            --pad-on: #151515;
            --pad-border: #111111;
            --fader-track: #040404;
            --fader-thumb: #d4d4d4;
            --pastel-1: transparent;
            --pastel-2: transparent;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Pastel Ambient Background */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, var(--pastel-1) 0%, transparent 60%),
                radial-gradient(circle at 80% 80%, var(--pastel-2) 0%, transparent 60%);
            mix-blend-mode: screen;
            z-index: 0;
            transition: background 1.5s ease-in-out;
            pointer-events: none;
        }

        /* Extreme Grain Overlay */
        .noise {
            position: fixed;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            width: 200vw; height: 200vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.85;
            mix-blend-mode: overlay;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            animation: grain 0.15s steps(2) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            30% { transform: translate(3%, -15%); }
            50% { transform: translate(12%, 9%); }
            70% { transform: translate(9%, 4%); }
            90% { transform: translate(-1%, 7%); }
        }

        header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            mix-blend-mode: difference;
        }

        header img {
            width: 65px;
            height: auto;
            filter: contrast(200%) grayscale(100%);
        }

        /* --- FULLSCREEN VOID CANVAS --- */
        .void-space {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            overflow: hidden;
            z-index: 1;
        }

        .strobe-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fg);
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            mix-blend-mode: exclusion;
        }

        /* --- LOGO-INSPIRED PARAMETRIC ART --- */
        .art-rig {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            z-index: 2;
        }

        .ch-h, .ch-v, .oval-main, .arc-inner, .core-dot {
            position: absolute;
            mix-blend-mode: screen;
            transition: all 0.1s ease-out, background 1.5s ease, filter 1.5s ease;
            pointer-events: none;
            filter: drop-shadow(0 0 12px var(--glow-color));
        }

        .ch-h {
            background: linear-gradient(90deg, var(--grad-1), var(--grad-2));
            height: 2px; width: 0;
        }

        .ch-v {
            background: linear-gradient(180deg, var(--grad-1), var(--grad-2));
            width: 2px; height: 0;
        }

        .oval-main {
            background: linear-gradient(45deg, var(--grad-1), var(--grad-2));
            -webkit-mask: radial-gradient(ellipse, transparent 65%, black 67%);
            mask: radial-gradient(ellipse, transparent 65%, black 67%);
            border-radius: 50%;
            opacity: 0;
        }

        .arc-inner {
            background: linear-gradient(-45deg, var(--grad-2), var(--grad-1));
            -webkit-mask: radial-gradient(ellipse, transparent 60%, black 63%);
            mask: radial-gradient(ellipse, transparent 60%, black 63%);
            clip-path: polygon(0 20%, 100% 20%, 100% 80%, 0 80%);
            border-radius: 50%;
            opacity: 0;
        }

        .core-dot {
            background: radial-gradient(circle, var(--grad-1) 0%, var(--grad-2) 100%);
            border-radius: 50%;
            opacity: 0;
        }

        .shard-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .shard {
            position: absolute;
            background: linear-gradient(to bottom right, var(--grad-1), var(--grad-2));
            opacity: 0;
            transform-origin: center;
            mix-blend-mode: screen;
            transition: opacity 0.2s, transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1), background 1.5s ease;
            border-radius: 1px;
            filter: drop-shadow(0 0 8px var(--glow-color));
        }

        /* --- FLOATING CONTROL PANEL --- */
        .device-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: var(--panel);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--panel-border);
            padding: 24px;
            border-radius: 8px;
            display: flex;
            align-items: stretch;
            gap: 24px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.05);
            width: 92vw;
            max-width: 550px;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: clamp(6px, 1.5vw, 12px);
            flex: 1;
        }

        .pad {
            width: 100%; 
            height: 100%;
            min-height: 60px; 
            background: var(--pad-off);
            border: 1px solid var(--pad-border);
            border-radius: 4px;
            color: #222;
            font-size: clamp(9px, 2.2vw, 12px);
            font-weight: bold;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        .pad.active {
            color: #888;
            background: var(--pad-on);
            border-color: #333;
            cursor: pointer;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.02);
            text-align: center;
            line-height: 1.2;
        }

        .pad.active:hover {
            background: #1f1f1f;
            color: #aaa;
            border-color: #555;
        }

        .pad.active:active {
            background: var(--grad-1);
            color: var(--bg);
            box-shadow: 0 0 20px var(--glow-color);
        }

        /* Shuffle Button Pulsating Glow */
        .shuffle-glow {
            animation: padPulse 2s infinite alternate ease-in-out;
            border-color: #444 !important;
        }

        @keyframes padPulse {
            0% { box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.05); color: #888; }
            100% { box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 0 15px rgba(255,255,255,0.3); color: #fff; }
        }

        .fader-module {
            width: 90px;
            background: #050505;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.9);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px; 
            height: 70px; 
            background: transparent;
            transform: rotate(-90deg);
            outline: none !important;
            margin: 0;
            z-index: 5;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 22px; 
            background: var(--fader-track);
            border: 1px solid #111;
            border-radius: 3px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,1);
        }

        input[type="range"]::-moz-range-track {
            width: 100%; height: 22px; 
            background: var(--fader-track);
            border: 1px solid #111;
            border-radius: 3px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,1);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 48px; width: 38px; 
            background: var(--fader-thumb);
            border: 3px solid #000;
            border-radius: 4px;
            margin-top: -14px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.8);
            cursor: ns-resize;
            transition: box-shadow 0.2s ease-out;
        }

        input[type="range"]::-moz-range-thumb {
            height: 48px; width: 38px; 
            background: var(--fader-thumb);
            border: 3px solid #000;
            border-radius: 4px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.8);
            cursor: ns-resize;
            transition: box-shadow 0.2s ease-out;
        }

        .glow-active::-webkit-slider-thumb {
            animation: thumbPulse 1.2s infinite alternate !important;
        }
        .glow-active::-moz-range-thumb {
            animation: thumbPulse 1.2s infinite alternate !important;
        }

        @keyframes thumbPulse {
            0% { box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.8), 0 0 5px rgba(255,255,255,0.1); }
            100% { box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,1), 0 0 30px 10px rgba(255,255,255,0.6); }
        }

        /* Animated Bouncing Arrow - Positioned Higher */
        .fader-indicator {
            position: absolute;
            right: 8px; 
            top: 20%; /* Moved up from 40% so it doesn't touch the fader handle */
            width: 24px; height: 24px;
            color: #fff;
            pointer-events: none;
            transition: opacity 0.4s ease-out;
            opacity: 0; 
            z-index: 2;
        }

        .show-indicator {
            animation: arrowBounce 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes arrowBounce {
            0% { transform: translateY(10px); opacity: 0.2; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
            50% { transform: translateY(-10px); opacity: 1; filter: drop-shadow(0 0 15px rgba(255,255,255,1)); }
            100% { transform: translateY(10px); opacity: 0.2; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        }

        @media (max-width: 600px) {
            .device-panel {
                bottom: 25px; padding: 16px; gap: 12px;
            }
            .fader-module { width: 75px; }
            .pad { min-height: 50px; font-size: 10px; }
            .fader-indicator { right: 4px; width: 20px; height: 20px; top: 15%; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div class="noise"></div>
    <header><img src="AZEFF_Icon-White.png" alt="AZEFF Logo"></header>

    <div class="void-space" id="voidSpace">
        <div class="strobe-flash" id="strobe"></div>
        
        <div class="art-rig" id="artRig">
            <div class="ch-h" id="chH"></div>
            <div class="ch-v" id="chV"></div>
            <div class="oval-main" id="ovalMain"></div>
            <div class="arc-inner" id="arcInner"></div>
            <div class="core-dot" id="coreDot"></div>
        </div>

        <div class="shard-container" id="shardField"></div>
    </div>

    <div class="device-panel">
        <div class="matrix" id="pad-matrix">
            </div>
        
        <div class="fader-module" id="faderContainer">
            <input type="range" id="sizeFader" class="glow-active" min="0" max="100" value="0">
            <svg class="fader-indicator show-indicator" id="arrowIndicator" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </div>
    </div>

    <script>
        const fader = document.getElementById('sizeFader');
        const faderContainer = document.getElementById('faderContainer');
        const arrowIndicator = document.getElementById('arrowIndicator');
        const artRig = document.getElementById('artRig');
        const chH = document.getElementById('chH');
        const chV = document.getElementById('chV');
        const ovalMain = document.getElementById('ovalMain');
        const arcInner = document.getElementById('arcInner');
        const coreDot = document.getElementById('coreDot');
        
        const shardField = document.getElementById('shardField');
        const strobe = document.getElementById('strobe');
        const matrix = document.getElementById('pad-matrix');
        const rootStyles = document.documentElement.style;

        const NUM_SHARDS = 45;
        const SHARDS = [];

        let artState = {
            stretchX: 1,
            stretchY: 1,
            rotSpeed: 1,
            shardBiasX: 1,
            shardBiasY: 1,
            colorHue: 0,
            hasColor: false
        };

        function resizeFader() {
            const containerHeight = faderContainer.clientHeight;
            fader.style.width = `${containerHeight - 16}px`; 
        }

        window.addEventListener('resize', resizeFader);

        function triggerShuffle() {
            artState.hasColor = true;
            artState.colorHue = Math.floor(Math.random() * 360);
            
            artState.stretchX = Math.random() * 1.5 + 0.5;
            artState.stretchY = Math.random() * 1.5 + 0.5;
            artState.rotSpeed = (Math.random() - 0.5) * 4; 
            artState.shardBiasX = (Math.random() - 0.5) * 2.5;
            artState.shardBiasY = (Math.random() - 0.5) * 2.5;

            const hue1 = artState.colorHue;
            const hue2 = (hue1 + 50) % 360; 
            
            rootStyles.setProperty('--pastel-1', `hsla(${hue1}, 75%, 60%, 0.15)`);
            rootStyles.setProperty('--pastel-2', `hsla(${(hue1 + 180)%360}, 75%, 60%, 0.15)`);
            
            rootStyles.setProperty('--grad-1', `hsl(${hue1}, 85%, 70%)`);
            rootStyles.setProperty('--grad-2', `hsl(${hue2}, 85%, 65%)`);
            
            rootStyles.setProperty('--glow-color', `hsla(${hue1}, 80%, 65%, 0.5)`);

            updateArtPhysics();
        }

        function initDevice() {
            const NUM_PADS = 8; 
            
            // Map specific indices to actions to control grid layout
            const actions = {
                0: { text: "SHUFFLE", act: triggerShuffle, extraClass: "shuffle-glow" },
                5: { text: "LOG IN", act: () => alert("AUTH_SEQ_INIT") },
                6: { text: "INFO", act: () => alert("SYS_DATA_READ") },
                7: { text: "CONTACT", act: () => alert("UPLINK_ESTAB") }
            };

            for(let i = 0; i < NUM_PADS; i++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                
                if (actions[i]) {
                    const action = actions[i];
                    pad.classList.add('active');
                    if(action.extraClass) pad.classList.add(action.extraClass);
                    
                    pad.innerText = action.text;
                    pad.addEventListener('touchstart', (e) => {
                        e.preventDefault(); 
                        action.act();
                    });
                    pad.onclick = action.act;
                } else {
                    const symbols = ["+", "-", "·", "::", "||", "x", ""];
                    pad.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                }
                
                matrix.appendChild(pad);
            }
        }

        function initArt() {
            for (let i = 0; i < NUM_SHARDS; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                
                const isLine = Math.random() > 0.6;
                const w = isLine ? (Math.random() * 3 + 1) : (Math.random() * 80 + 10);
                const h = isLine ? (Math.random() * 200 + 50) : (Math.random() * 80 + 10);
                
                shard.style.width = `${w}px`;
                shard.style.height = `${h}px`;
                
                shard.dataset.angle = Math.random() * Math.PI * 2;
                shard.dataset.dist = Math.random() * 20 + 5; 
                shard.dataset.rot = Math.random() * 360;
                
                shardField.appendChild(shard);
                SHARDS.push(shard);
            }
        }

        function updateArtPhysics() {
            const val = parseInt(fader.value);
            const norm = val / 100;

            const sX = artState.stretchX;
            const sY = artState.stretchY;

            chV.style.height = `${norm * 150 * sY}vh`;
            chH.style.width = `${norm * 150 * sX}vw`;
            const thickness = val === 100 ? 12 : (2 + norm * 5);
            chV.style.width = `${thickness}px`;
            chH.style.height = `${thickness}px`;

            ovalMain.style.width = `${norm * 85 * sX}vw`;
            ovalMain.style.height = `${norm * 35 * sY}vw`;
            ovalMain.style.opacity = norm > 0.05 ? Math.min(1, norm * 2.5) : 0;
            
            arcInner.style.width = `${norm * 50 * sX}vw`;
            arcInner.style.height = `${norm * 35 * sY}vw`;
            arcInner.style.opacity = norm > 0.1 ? Math.min(1, (norm - 0.1) * 3) : 0;

            const coreSize = (norm * 12) + (norm > 0.85 ? Math.random() * 4 : 0);
            coreDot.style.width = `${coreSize * ((sX+sY)/2)}vw`;
            coreDot.style.height = `${coreSize * ((sX+sY)/2)}vw`;
            coreDot.style.opacity = norm > 0.15 ? 1 : 0;

            if (norm > 0.5) {
                const rot = (norm - 0.5) * 45 * artState.rotSpeed; 
                const jitterX = (Math.random() - 0.5) * (norm - 0.5) * 20;
                const jitterY = (Math.random() - 0.5) * (norm - 0.5) * 20;
                artRig.style.transform = `translate(calc(-50% + ${jitterX}px), calc(-50% + ${jitterY}px)) rotate(${rot}deg)`;
            } else {
                artRig.style.transform = `translate(-50%, -50%) rotate(0deg)`;
            }

            const activeThreshold = Math.floor(norm * NUM_SHARDS);
            SHARDS.forEach((shard, i) => {
                if (i < activeThreshold) {
                    shard.style.opacity = (Math.random() * 0.5 + 0.1) * norm;
                    const bX = 1 + (artState.shardBiasX * norm);
                    const bY = 1 + (artState.shardBiasY * norm);
                    
                    const expandX = Math.cos(shard.dataset.angle) * (parseFloat(shard.dataset.dist) + norm * 45) * bX;
                    const expandY = Math.sin(shard.dataset.angle) * (parseFloat(shard.dataset.dist) + norm * 15) * bY;
                    const r = parseFloat(shard.dataset.rot) + (norm * 270 * artState.rotSpeed);
                    
                    shard.style.transform = `translate(${expandX}vw, ${expandY}vw) rotate(${r}deg) scale(${norm * 2 + 0.5})`;
                } else {
                    shard.style.opacity = 0;
                    shard.style.transform = `translate(0,0) scale(0)`;
                }
            });

            if (norm > 0.88) {
                const flicker = Math.random() > 0.4 ? (norm - 0.8) * 5 : 0;
                strobe.style.opacity = flicker;
                document.getElementById('voidSpace').style.backgroundColor = Math.random() > 0.85 ? '#0c0c0c' : '#000';
            } else {
                strobe.style.opacity = 0;
                document.getElementById('voidSpace').style.backgroundColor = '#000';
            }
        }

        function clearAffordance() {
            if (fader.classList.contains('glow-active')) {
                fader.classList.remove('glow-active');
                arrowIndicator.classList.remove('show-indicator');
                arrowIndicator.style.opacity = "0"; 
            }
        }

        initDevice();
        initArt();
        
        setTimeout(resizeFader, 100); 
        
        fader.addEventListener('input', () => {
            clearAffordance();
            updateArtPhysics();
        });
        fader.addEventListener('mousedown', clearAffordance);
        fader.addEventListener('touchstart', clearAffordance, {passive: true});
        
        updateArtPhysics();

        let touchStartY = 0;
        const voidArea = document.getElementById('voidSpace');
        
        voidArea.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
            clearAffordance();
        }, {passive: true});

        voidArea.addEventListener('touchmove', e => {
            let touchEndY = e.touches[0].clientY;
            let diff = touchStartY - touchEndY;
            
            if (Math.abs(diff) > 4) {
                let newVal = parseInt(fader.value) + (diff * 0.5);
                newVal = Math.max(0, Math.min(100, newVal));
                fader.value = newVal;
                updateArtPhysics();
                touchStartY = touchEndY; 
            }
        }, {passive: true});
        
    </script>
</body>
</html>
