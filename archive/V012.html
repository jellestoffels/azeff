<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Azeff | Abstract Device</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #e0e0e0;
            --grad-1: #ffffff;
            --grad-2: #666666;
            --glow-color: rgba(255, 255, 255, 0.4);
            
            --panel: rgba(10, 10, 10, 0.85);
            --panel-border: #1a1a1a;
            --pad-off: #0a0a0a;
            --pad-on: #151515;
            --pad-border: #111111;
            --fader-track: #040404;
            --fader-thumb: #d4d4d4;
            --pastel-1: transparent;
            --pastel-2: transparent;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Pastel Ambient Background */
        .ambient-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 20%, var(--pastel-1) 0%, transparent 60%),
                radial-gradient(circle at 80% 80%, var(--pastel-2) 0%, transparent 60%);
            mix-blend-mode: screen;
            z-index: 0;
            transition: background 1.5s ease-in-out;
            pointer-events: none;
            will-change: background;
        }

        /* Extreme Grain Overlay */
        .noise {
            position: fixed;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            width: 200vw; height: 200vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.85;
            mix-blend-mode: overlay;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            animation: grain 0.15s steps(2) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            30% { transform: translate(3%, -15%); }
            50% { transform: translate(12%, 9%); }
            70% { transform: translate(9%, 4%); }
            90% { transform: translate(-1%, 7%); }
        }

        /* HEADER & LOGOS */
        header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            mix-blend-mode: difference;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        header img.icon {
            width: 65px;
            height: auto;
            filter: contrast(200%) grayscale(100%);
        }

        header img.wordmark {
            height: 28px;
            width: auto;
            filter: contrast(200%) grayscale(100%);
            margin-top: 4px;
        }

        /* --- FULLSCREEN VOID CANVAS --- */
        .void-space {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            overflow: hidden;
            z-index: 1;
            will-change: filter, background-color;
        }

        .strobe-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fg);
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            mix-blend-mode: exclusion;
            will-change: opacity;
        }

        /* --- GPU ACCELERATED LOGO ART RIG --- */
        .art-rig {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            z-index: 2;
            transition: transform 0s;
        }

        .ch-h, .ch-v, .ring, .core-dot {
            position: absolute;
            top: 50%; left: 50%;
            mix-blend-mode: screen;
            transition: background 1.5s ease;
            pointer-events: none;
            transform-origin: center;
            will-change: transform, opacity;
        }

        .ch-h {
            background: linear-gradient(90deg, var(--grad-1), var(--grad-2));
            width: 200vw; height: 2px;
            margin-left: -100vw; margin-top: -1px;
            box-shadow: 0 0 15px var(--glow-color);
        }

        .ch-v {
            background: linear-gradient(180deg, var(--grad-1), var(--grad-2));
            width: 2px; height: 200vh;
            margin-left: -1px; margin-top: -100vh;
            box-shadow: 0 0 15px var(--glow-color);
        }

        .ring {
            border-radius: 50%;
            width: 100vw; height: 100vw;
            margin-left: -50vw; margin-top: -50vw;
            -webkit-mask: radial-gradient(ellipse, transparent 63%, black 65%);
            mask: radial-gradient(ellipse, transparent 63%, black 65%);
            opacity: 0;
        }

        .core-dot {
            background: radial-gradient(circle, var(--grad-1) 0%, var(--grad-2) 100%);
            border-radius: 50%;
            width: 20vw; height: 20vw;
            margin-left: -10vw; margin-top: -10vw;
            opacity: 0;
        }

        .shard-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .shard {
            position: absolute;
            background: linear-gradient(to bottom right, var(--grad-1), var(--grad-2));
            opacity: 0;
            transform-origin: center;
            mix-blend-mode: screen;
            transition: background 1.5s ease;
            border-radius: 1px;
            box-shadow: 0 0 8px var(--glow-color);
            will-change: transform, opacity;
        }

        /* --- IMPRINT MODAL --- */
        .imprint-modal {
            position: absolute;
            bottom: calc(100% + 20px);
            left: 0;
            width: 100%;
            max-height: 50vh;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 24px;
            color: #b0b0b0;
            font-size: 0.85rem;
            line-height: 1.6;
            overflow-y: auto;
            z-index: 90;
            opacity: 0;
            pointer-events: none;
            transform: translateY(15px);
            transition: all 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            text-align: left;
        }

        .imprint-modal.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .imprint-modal h1, .imprint-modal h2 {
            color: var(--fg);
            margin-bottom: 1rem;
            font-family: monospace;
            text-transform: uppercase;
        }

        .imprint-modal p { margin-bottom: 1rem; }
        
        .imprint-modal .close-btn {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: #fff; font-size: 1.5rem;
            cursor: pointer; opacity: 0.5;
        }
        .imprint-modal .close-btn:hover { opacity: 1; }

        /* --- LOGIN OVERLAY --- */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        .login-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .login-panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9);
            position: relative;
            transform: translateY(20px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        .login-overlay.show .login-panel {
            transform: translateY(0) scale(1);
        }
        .login-close {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: #fff; font-size: 1.5rem;
            cursor: pointer; opacity: 0.5;
        }
        .login-close:hover { opacity: 1; }
        .login-logo {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            gap: 15px;
        }
        .login-logo img.icon { width: 50px; height: auto; }
        .login-logo img.wordmark { height: 22px; width: auto; margin-top: 4px; }
        
        .login-form {
            display: flex; flex-direction: column; gap: 15px;
        }
        .login-form input {
            background: #000; border: 1px solid #333; color: #fff;
            padding: 14px; border-radius: 4px; font-family: monospace;
            outline: none; text-align: center; font-size: 1rem;
        }
        .login-form input:focus { border-color: #777; }
        .login-form button {
            background: var(--fg); color: var(--bg); border: none;
            padding: 14px; font-weight: bold; font-family: monospace;
            cursor: pointer; border-radius: 4px; text-transform: uppercase;
            font-size: 1rem; transition: background 0.2s, box-shadow 0.2s;
        }
        .login-form button:hover { 
            background: #fff; 
            box-shadow: 0 0 15px rgba(255,255,255,0.4); 
        }

        /* --- FLOATING CONTROL PANEL --- */
        .device-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: var(--panel);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--panel-border);
            padding: 24px;
            border-radius: 8px;
            display: flex;
            align-items: stretch;
            gap: 24px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.05);
            width: 92vw;
            max-width: 550px;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: clamp(6px, 1.5vw, 12px);
            flex: 1;
        }

        .pad {
            width: 100%; 
            height: 100%;
            min-height: 60px; 
            background: var(--pad-off);
            border: 1px solid var(--pad-border);
            border-radius: 4px;
            color: #222;
            font-size: clamp(9px, 2.2vw, 12px);
            font-weight: bold;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            transition: all 0.2s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .pad.active {
            color: #888;
            background: var(--pad-on);
            border-color: #333;
            cursor: pointer;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.02);
            text-align: center;
            line-height: 1.2;
        }

        .pad.active:hover {
            background: #1f1f1f;
            color: #aaa;
            border-color: #555;
        }

        .pad.active:active {
            background: var(--grad-1);
            color: var(--bg);
            box-shadow: 0 0 20px var(--glow-color);
            transition: all 0s;
        }

        /* PROMINENT INVERTED BUTTONS (SHUFFLE & FLASH) */
        .prominent-btn {
            background: var(--fg) !important;
            color: var(--bg) !important;
            border-color: #fff !important;
            animation: invertPulse 2.5s infinite alternate ease-in-out;
            text-shadow: none;
            box-shadow: inset 0 0 0 rgba(0,0,0,0) !important;
        }

        .prominent-btn:active {
            transform: scale(0.95);
            animation: none !important; /* Stop pulse while holding */
            background: #aaa !important;
            box-shadow: 0 0 30px var(--glow-color) !important;
        }

        @keyframes invertPulse {
            0% { box-shadow: 0 0 10px rgba(255,255,255,0.3); transform: scale(1); }
            100% { box-shadow: 0 0 25px rgba(255,255,255,0.8); transform: scale(1.05); }
        }

        .fader-module {
            width: 90px;
            background: #050505;
            border: 1px solid var(--panel-border);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.9);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 120px; 
            height: 70px; 
            background: transparent;
            transform: rotate(-90deg);
            outline: none !important;
            margin: 0;
            z-index: 5;
        }

        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%; height: 22px; 
            background: var(--fader-track);
            border: 1px solid #111;
            border-radius: 3px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,1);
        }

        input[type="range"]::-moz-range-track {
            width: 100%; height: 22px; 
            background: var(--fader-track);
            border: 1px solid #111;
            border-radius: 3px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,1);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 48px; width: 38px; 
            background: var(--fader-thumb);
            border: 3px solid #000;
            border-radius: 4px;
            margin-top: -14px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.8);
            cursor: ns-resize;
            transition: box-shadow 0.2s ease-out;
        }

        input[type="range"]::-moz-range-thumb {
            height: 48px; width: 38px; 
            background: var(--fader-thumb);
            border: 3px solid #000;
            border-radius: 4px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.8);
            cursor: ns-resize;
            transition: box-shadow 0.2s ease-out;
        }

        .glow-active::-webkit-slider-thumb { animation: thumbPulse 1.2s infinite alternate !important; }
        .glow-active::-moz-range-thumb { animation: thumbPulse 1.2s infinite alternate !important; }

        @keyframes thumbPulse {
            0% { box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.8), 0 0 5px rgba(255,255,255,0.1); }
            100% { box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,1), 0 0 30px 10px rgba(255,255,255,0.6); }
        }

        .fader-indicator {
            position: absolute;
            right: 8px; 
            top: 20%; 
            width: 24px; height: 24px;
            color: #fff;
            pointer-events: none;
            transition: opacity 0.4s ease-out;
            opacity: 0; 
            z-index: 2;
        }

        .show-indicator { animation: arrowBounce 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1); }

        @keyframes arrowBounce {
            0% { transform: translateY(10px); opacity: 0.2; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
            50% { transform: translateY(-10px); opacity: 1; filter: drop-shadow(0 0 15px rgba(255,255,255,1)); }
            100% { transform: translateY(10px); opacity: 0.2; filter: drop-shadow(0 0 5px rgba(255,255,255,0.3)); }
        }

        @media (max-width: 600px) {
            header img.icon { width: 45px; }
            header img.wordmark { height: 20px; margin-top: 2px; }
            .device-panel { bottom: 25px; padding: 16px; gap: 12px; }
            .fader-module { width: 75px; }
            .pad { min-height: 50px; font-size: 10px; }
            .fader-indicator { right: 4px; width: 20px; height: 20px; top: 15%; }
            .imprint-modal { max-height: 60vh; font-size: 0.75rem; padding: 16px; bottom: calc(100% + 15px); }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"></div>
    <div class="noise"></div>
    <header>
        <img src="AZEFF_Icon-White.png" alt="AZEFF Logo" class="icon">
        <img src="AZEFF_Wordmark-White.png" alt="AZEFF" class="wordmark">
    </header>

    <div class="void-space" id="voidSpace">
        <div class="strobe-flash" id="strobe"></div>
        
        <div class="art-rig" id="artRig">
            <div class="ch-h" id="chH"></div>
            <div class="ch-v" id="chV"></div>
            <div id="ringsContainer"></div>
            <div class="core-dot" id="coreDot"></div>
        </div>

        <div class="shard-container" id="shardField"></div>
    </div>

    <div class="login-overlay" id="loginOverlay">
        <div class="login-panel">
            <button class="login-close" onclick="toggleLogin()">✕</button>
            <div class="login-logo">
                <img src="AZEFF_Icon-White.png" alt="AZEFF" class="icon">
                <img src="AZEFF_Wordmark-White.png" alt="AZEFF" class="wordmark">
            </div>
            <form class="login-form" onsubmit="event.preventDefault(); alert('Authentication processing...');">
                <input placeholder="Enter password" type="password" required>
                <button type="submit">Enter</button>
            </form>
        </div>
    </div>

    <div class="device-panel" id="devicePanel">
        <div class="imprint-modal" id="imprintModal">
            <button class="close-btn" onclick="toggleImprint()">×</button>
            <div id="imprintContent">Loading imprint...</div>
        </div>

        <div class="matrix" id="pad-matrix">
            </div>
        
        <div class="fader-module" id="faderContainer">
            <input type="range" id="sizeFader" class="glow-active" min="0" max="100" value="0">
            <svg class="fader-indicator show-indicator" id="arrowIndicator" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="19" x2="12" y2="5"></line>
                <polyline points="5 12 12 5 19 12"></polyline>
            </svg>
        </div>
    </div>

    <script>
        const fader = document.getElementById('sizeFader');
        const faderContainer = document.getElementById('faderContainer');
        const arrowIndicator = document.getElementById('arrowIndicator');
        const artRig = document.getElementById('artRig');
        const chH = document.getElementById('chH');
        const chV = document.getElementById('chV');
        const coreDot = document.getElementById('coreDot');
        const ringsContainer = document.getElementById('ringsContainer');
        const shardField = document.getElementById('shardField');
        const strobe = document.getElementById('strobe');
        const matrix = document.getElementById('pad-matrix');
        const voidSpace = document.getElementById('voidSpace');
        const rootStyles = document.documentElement.style;

        const imprintModal = document.getElementById('imprintModal');
        const imprintContent = document.getElementById('imprintContent');
        const loginOverlay = document.getElementById('loginOverlay');

        const NUM_SHARDS = 45;
        const SHARDS = [];
        const MAX_RINGS = 5;
        const RINGS = [];

        let artState = {
            stretchX: 1,
            stretchY: 1,
            rotSpeed: 1,
            shardBiasX: 1,
            shardBiasY: 1,
            numRings: 2, 
            colorHue: 0
        };

        let isUpdating = false;
        let isFlashing = false;

        function resizeFader() {
            const containerHeight = faderContainer.clientHeight;
            fader.style.width = `${containerHeight - 16}px`; 
        }
        window.addEventListener('resize', resizeFader);

        // UI OVERLAYS (IMPRINT & LOGIN)
        let imprintLoaded = false;
        async function toggleImprint() {
            imprintModal.classList.toggle('show');
            if (imprintModal.classList.contains('show') && !imprintLoaded) {
                try {
                    const response = await fetch('imprint.html');
                    if (response.ok) {
                        const text = await response.text();
                        imprintContent.innerHTML = text;
                    } else {
                        imprintContent.innerHTML = '<p>Error loading imprint content. Ensure imprint.html exists.</p>';
                    }
                } catch (error) {
                    imprintContent.innerHTML = '<p>Could not load imprint.html due to local cross-origin restrictions. Please run via a local server.</p>';
                }
                imprintLoaded = true;
            }
        }

        function toggleLogin() {
            loginOverlay.classList.toggle('show');
            // Auto-focus the input if opening
            if(loginOverlay.classList.contains('show')) {
                setTimeout(() => {
                    const passInput = loginOverlay.querySelector('input[type="password"]');
                    if(passInput) passInput.focus();
                }, 100);
            }
        }

        // FLASH LOGIC
        function startFlash(e) {
            if(e) e.preventDefault();
            if(isFlashing) return;
            isFlashing = true;
            flashLoop();
        }

        function stopFlash(e) {
            if(e) e.preventDefault();
            isFlashing = false;
            voidSpace.style.backgroundColor = '#000';
            voidSpace.style.filter = 'none';
            strobe.style.opacity = 0;
            scheduleUpdate(); 
        }

        function flashLoop() {
            if(!isFlashing) return;
            updateArtPhysics(); 
            requestAnimationFrame(flashLoop);
        }

        // SHUFFLE LOGIC
        function applyTemporaryTransition() {
            const elements = document.querySelectorAll('.ch-h, .ch-v, .ring, .core-dot, .shard, .art-rig');
            elements.forEach(el => {
                el.style.transition = 'transform 0.8s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.8s ease, background 1.5s ease';
            });
            clearTimeout(window.shuffleTimeout);
            window.shuffleTimeout = setTimeout(killTransitions, 850);
        }

        function killTransitions() {
            const elements = document.querySelectorAll('.ch-h, .ch-v, .ring, .core-dot, .shard, .art-rig');
            elements.forEach(el => {
                el.style.transition = 'background 1.5s ease';
            });
            clearTimeout(window.shuffleTimeout);
        }

        function triggerShuffle() {
            // Remove prominent styling visually from SHUFFLE after first use
            const shuffleBtn = document.getElementById('btn-shuffle');
            if(shuffleBtn) {
                shuffleBtn.classList.remove('prominent-btn');
                void shuffleBtn.offsetWidth; 
            }

            applyTemporaryTransition();

            artState.colorHue = Math.floor(Math.random() * 360);
            artState.stretchX = Math.random() * 1.5 + 0.5;
            artState.stretchY = Math.random() * 1.5 + 0.5;
            artState.rotSpeed = (Math.random() - 0.5) * 4; 
            artState.shardBiasX = (Math.random() - 0.5) * 2.5;
            artState.shardBiasY = (Math.random() - 0.5) * 2.5;
            artState.numRings = Math.floor(Math.random() * MAX_RINGS) + 1; 

            const hue1 = artState.colorHue;
            const hue2 = (hue1 + 50) % 360; 
            
            rootStyles.setProperty('--pastel-1', `hsla(${hue1}, 75%, 60%, 0.15)`);
            rootStyles.setProperty('--pastel-2', `hsla(${(hue1 + 180)%360}, 75%, 60%, 0.15)`);
            
            rootStyles.setProperty('--grad-1', `hsl(${hue1}, 85%, 70%)`);
            rootStyles.setProperty('--grad-2', `hsl(${hue2}, 85%, 65%)`);
            
            rootStyles.setProperty('--glow-color', `hsla(${hue1}, 80%, 65%, 0.5)`);

            scheduleUpdate();
        }

        function initDevice() {
            const NUM_PADS = 8; 
            
            // Map buttons: 0: SHUFFLE, 1: FLASH (next to each other top left). 6: IMPRINT, 7: LOG IN.
            const actions = {
                0: { id: "btn-shuffle", text: "SHUFFLE", act: triggerShuffle, extraClass: "prominent-btn" },
                1: { id: "btn-flash", text: "FLASH", extraClass: "prominent-btn", isHold: true },
                6: { text: "IMPRINT", act: toggleImprint },
                7: { text: "LOG IN", act: toggleLogin }
            };

            for(let i = 0; i < NUM_PADS; i++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                
                if (actions[i]) {
                    const action = actions[i];
                    pad.classList.add('active');
                    if(action.id) pad.id = action.id;
                    if(action.extraClass) pad.classList.add(...action.extraClass.split(" "));
                    pad.innerText = action.text;
                    
                    if (action.isHold) {
                        pad.addEventListener('mousedown', startFlash);
                        pad.addEventListener('touchstart', startFlash, {passive: false});
                        
                        pad.addEventListener('mouseup', stopFlash);
                        pad.addEventListener('mouseleave', stopFlash);
                        pad.addEventListener('touchend', stopFlash);
                        pad.addEventListener('touchcancel', stopFlash);
                    } else {
                        pad.addEventListener('touchstart', (e) => {
                            e.preventDefault(); 
                            action.act();
                        });
                        pad.onclick = action.act;
                    }
                } else {
                    const symbols = ["+", "-", "·", "::", "||", "x", ""];
                    pad.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                }
                
                matrix.appendChild(pad);
            }
        }

        function initArt() {
            for (let i = 0; i < MAX_RINGS; i++) {
                const ring = document.createElement('div');
                ring.className = 'ring';
                ring.style.background = (i % 2 === 0) 
                    ? 'linear-gradient(45deg, var(--grad-1), var(--grad-2))'
                    : 'linear-gradient(-45deg, var(--grad-2), var(--grad-1))';
                ringsContainer.appendChild(ring);
                RINGS.push(ring);
            }

            for (let i = 0; i < NUM_SHARDS; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                
                const isLine = Math.random() > 0.6;
                const w = isLine ? (Math.random() * 3 + 1) : (Math.random() * 80 + 10);
                const h = isLine ? (Math.random() * 200 + 50) : (Math.random() * 80 + 10);
                
                shard.style.width = `${w}px`;
                shard.style.height = `${h}px`;
                shard.dataset.angle = Math.random() * Math.PI * 2;
                shard.dataset.dist = Math.random() * 20 + 5; 
                shard.dataset.rot = Math.random() * 360;
                
                shardField.appendChild(shard);
                SHARDS.push(shard);
            }
        }

        function updateArtPhysics() {
            const val = parseInt(fader.value);
            const norm = val / 100;

            const sX = artState.stretchX;
            const sY = artState.stretchY;

            // Base Calculations
            const thicknessScale = (val === 100 ? 12 : (2 + norm * 5)) / 2;
            let chV_scale = `scale(${thicknessScale}, ${norm * 0.75 * sY})`;
            let chH_scale = `scale(${norm * 0.75 * sX}, ${thicknessScale})`;
            let coreSizeScale = (((norm * 12) + (norm > 0.85 ? Math.random() * 4 : 0)) / 10) * ((sX+sY)/2);
            let core_scale = `scale(${coreSizeScale})`;
            
            let rig_transform = `translate(-50%, -50%) rotate(0deg)`;
            if (norm > 0.5) {
                const rot = (norm - 0.5) * 45 * artState.rotSpeed; 
                const jitterX = (Math.random() - 0.5) * (norm - 0.5) * 20;
                const jitterY = (Math.random() - 0.5) * (norm - 0.5) * 20;
                rig_transform = `translate(calc(-50% + ${jitterX}px), calc(-50% + ${jitterY}px)) rotate(${rot}deg)`;
            }

            // Apply FLASH Chaos Overrides
            if (isFlashing) {
                const rx = (Math.random() - 0.5) * 50;
                const ry = (Math.random() - 0.5) * 50;
                rig_transform = `translate(calc(-50% + ${rx}vw), calc(-50% + ${ry}vh)) rotate(${Math.random() * 360}deg) scale(${Math.random() * 1.5 + 0.5})`;
                
                voidSpace.style.backgroundColor = Math.random() > 0.3 ? '#fff' : '#000';
                voidSpace.style.filter = Math.random() > 0.5 ? 'invert(1)' : 'none';
                strobe.style.opacity = Math.random() > 0.5 ? 1 : 0;
            } else if (norm > 0.88) {
                const flicker = Math.random() > 0.4 ? (norm - 0.8) * 5 : 0;
                strobe.style.opacity = flicker;
                voidSpace.style.backgroundColor = Math.random() > 0.85 ? '#0c0c0c' : '#000';
            } else {
                strobe.style.opacity = 0;
                voidSpace.style.backgroundColor = '#000';
            }

            // Apply Transforms
            chV.style.transform = chV_scale;
            chH.style.transform = chH_scale;
            coreDot.style.transform = core_scale;
            coreDot.style.opacity = norm > 0.15 || isFlashing ? 1 : 0;
            artRig.style.transform = rig_transform;

            // Rings Update
            RINGS.forEach((ring, i) => {
                if (i < artState.numRings) {
                    const sizeFactor = 0.85 - (i * 0.18); 
                    const rScale = isFlashing ? Math.random() * 2 : (norm * sizeFactor);
                    ring.style.transform = `scale(${rScale * sX}, ${rScale * sY})`;
                    ring.style.opacity = norm > 0.05 || isFlashing ? Math.min(1, norm * 2.5) : 0;
                } else {
                    ring.style.transform = `scale(0)`;
                    ring.style.opacity = 0;
                }
            });

            // Shards Update
            const activeThreshold = Math.floor(norm * NUM_SHARDS);
            SHARDS.forEach((shard, i) => {
                if (isFlashing) {
                    shard.style.opacity = Math.random();
                    shard.style.transform = `translate(${(Math.random()-0.5)*120}vw, ${(Math.random()-0.5)*120}vh) rotate(${Math.random()*360}deg) scale(${Math.random()*3})`;
                } else if (i < activeThreshold) {
                    shard.style.opacity = (Math.random() * 0.5 + 0.1) * norm;
                    const bX = 1 + (artState.shardBiasX * norm);
                    const bY = 1 + (artState.shardBiasY * norm);
                    
                    const expandX = Math.cos(shard.dataset.angle) * (parseFloat(shard.dataset.dist) + norm * 45) * bX;
                    const expandY = Math.sin(shard.dataset.angle) * (parseFloat(shard.dataset.dist) + norm * 15) * bY;
                    const r = parseFloat(shard.dataset.rot) + (norm * 270 * artState.rotSpeed);
                    
                    shard.style.transform = `translate(${expandX}vw, ${expandY}vw) rotate(${r}deg) scale(${norm * 2 + 0.5})`;
                } else {
                    shard.style.opacity = 0;
                    shard.style.transform = `translate(0,0) scale(0)`;
                }
            });
        }

        function scheduleUpdate() {
            if (!isUpdating && !isFlashing) {
                isUpdating = true;
                requestAnimationFrame(() => {
                    updateArtPhysics();
                    isUpdating = false;
                });
            }
        }

        function clearAffordance() {
            killTransitions(); 
            if (fader.classList.contains('glow-active')) {
                fader.classList.remove('glow-active');
                arrowIndicator.classList.remove('show-indicator');
                arrowIndicator.style.opacity = "0"; 
            }
        }

        initDevice();
        initArt();
        
        setTimeout(resizeFader, 100); 
        
        fader.addEventListener('input', () => {
            clearAffordance();
            scheduleUpdate();
        });
        fader.addEventListener('mousedown', clearAffordance);
        fader.addEventListener('touchstart', clearAffordance, {passive: true});
        
        scheduleUpdate();

        let touchStartY = 0;
        
        voidSpace.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
            clearAffordance();
        }, {passive: true});

        voidSpace.addEventListener('touchmove', e => {
            let touchEndY = e.touches[0].clientY;
            let diff = touchStartY - touchEndY;
            
            if (Math.abs(diff) > 4) {
                let newVal = parseInt(fader.value) + (diff * 0.5);
                newVal = Math.max(0, Math.min(100, newVal));
                fader.value = newVal;
                scheduleUpdate();
                touchStartY = touchEndY; 
            }
        }, {passive: true});
        
    </script>
</body>
</html>
