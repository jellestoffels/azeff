<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Azeff | Abstract Device</title>
    <style>
        :root {
            --bg: #000000;
            --fg: #e0e0e0;
            --panel: rgba(8, 8, 8, 0.85);
            --panel-border: #1a1a1a;
            --pad-off: #0a0a0a;
            --pad-on: #151515;
            --pad-border: #111111;
            --fader-track: #040404;
            --fader-thumb: #d4d4d4;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-drag: none;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100dvh;
            background-color: var(--bg);
            color: var(--fg);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        /* Extreme Grain Overlay */
        .noise {
            position: fixed;
            top: -50%; left: -50%; right: -50%; bottom: -50%;
            width: 200vw; height: 200vh;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.85;
            mix-blend-mode: overlay;
            background: url('data:image/svg+xml;utf8,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="1.8" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
            animation: grain 0.15s steps(2) infinite;
        }

        @keyframes grain {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-5%, -10%); }
            30% { transform: translate(3%, -15%); }
            50% { transform: translate(12%, 9%); }
            70% { transform: translate(9%, 4%); }
            90% { transform: translate(-1%, 7%); }
        }

        /* Increased Logo Size */
        header {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 100;
            mix-blend-mode: difference;
        }

        header img {
            width: 65px;
            height: auto;
            filter: contrast(200%) grayscale(100%);
        }

        /* --- FULLSCREEN VOID CANVAS --- */
        .void-space {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg);
            overflow: hidden;
            z-index: 1;
        }

        .strobe-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--fg);
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            mix-blend-mode: exclusion;
        }

        /* --- LOGO-INSPIRED PARAMETRIC ART --- */
        .art-rig {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: flex; justify-content: center; align-items: center;
            z-index: 2;
        }

        .ch-h, .ch-v, .oval-main, .arc-inner, .core-dot {
            position: absolute;
            background: transparent;
            mix-blend-mode: difference;
            transition: all 0.1s ease-out;
            pointer-events: none;
        }

        .ch-h {
            background: var(--fg);
            height: 2px; width: 0;
            box-shadow: 0 0 20px var(--fg);
        }

        .ch-v {
            background: var(--fg);
            width: 2px; height: 0;
            box-shadow: 0 0 20px var(--fg);
        }

        .oval-main {
            border: 2px solid var(--fg);
            border-radius: 50%;
            box-shadow: inset 0 0 40px rgba(255,255,255,0.05), 0 0 40px rgba(255,255,255,0.05);
            opacity: 0;
        }

        .arc-inner {
            border: 2px solid var(--fg);
            border-radius: 50%;
            border-top: none; 
            border-bottom: none;
            opacity: 0;
        }

        .core-dot {
            background: var(--fg);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--fg);
            opacity: 0;
        }

        /* Abstract orbiting shards */
        .shard-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .shard {
            position: absolute;
            background: var(--fg);
            opacity: 0;
            transform-origin: center;
            mix-blend-mode: difference;
            transition: opacity 0.2s, transform 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        /* --- FLOATING CONTROL PANEL --- */
        .device-panel {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: var(--panel);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--panel-border);
            padding: 20px;
            border-radius: 6px;
            display: flex;
            gap: 20px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.9), inset 0 1px 1px rgba(255,255,255,0.05);
            width: 90vw;
            max-width: 450px;
        }

        .matrix {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(4px, 1.5vw, 8px);
            align-content: center;
            flex: 1;
        }

        .pad {
            width: 100%; 
            aspect-ratio: 1;
            background: var(--pad-off);
            border: 1px solid var(--pad-border);
            border-radius: 4px;
            color: #222;
            font-size: clamp(8px, 2.5vw, 11px);
            font-weight: bold;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex; justify-content: center; align-items: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            transition: all 0.1s;
        }

        .pad.active {
            color: #888;
            background: var(--pad-on);
            border-color: #333;
            cursor: pointer;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.8), 0 0 5px rgba(255,255,255,0.02);
        }

        .pad.active:hover {
            background: #1f1f1f;
            color: #aaa;
            border-color: #555;
        }

        .pad.active:active {
            background: var(--fg);
            color: var(--bg);
            box-shadow: 0 0 15px var(--fg);
        }

        /* Thick Custom Fader */
        .fader-module {
            width: 80px;
            background: #050505;
            border: 1px solid var(--panel-border);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            box-shadow: inset 0 5px 15px rgba(0,0,0,0.9);
        }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 180px; 
            height: 70px; 
            background: transparent;
            transform: rotate(-90deg);
            outline: none !important;
            margin: 0;
        }

        input[type="range"]:focus, input[type="range"]:active {
            outline: none !important;
        }

        /* Extra Thick Track */
        input[type="range"]::-webkit-slider-runnable-track {
            width: 100%;
            height: 20px; 
            background: var(--fader-track);
            border: 1px solid #111;
            border-radius: 2px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,1);
        }

        input[type="range"]::-moz-range-track {
            width: 100%; height: 20px; 
            background: var(--fader-track);
            border: 1px solid #111;
            border-radius: 2px;
            box-shadow: inset 0 3px 8px rgba(0,0,0,1);
        }

        /* Chunky Brutalist Thumb */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 44px; 
            width: 36px; 
            background: var(--fader-thumb);
            border: 3px solid #000;
            border-radius: 3px;
            margin-top: -14px; 
            box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.8);
            cursor: ns-resize;
        }

        input[type="range"]::-moz-range-thumb {
            height: 44px; width: 36px; 
            background: var(--fader-thumb);
            border: 3px solid #000;
            border-radius: 3px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.9), inset 0 1px 2px rgba(255,255,255,0.8);
            cursor: ns-resize;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .device-panel {
                bottom: 25px;
                padding: 12px;
                gap: 12px;
            }
            .fader-module { width: 70px; }
            input[type="range"] { width: 160px; }
        }
    </style>
</head>
<body>

    <div class="noise"></div>
    <header><img src="AZEFF_Icon-White.png" alt="AZEFF Logo"></header>

    <div class="void-space" id="voidSpace">
        <div class="strobe-flash" id="strobe"></div>
        
        <div class="art-rig" id="artRig">
            <div class="ch-h" id="chH"></div>
            <div class="ch-v" id="chV"></div>
            <div class="oval-main" id="ovalMain"></div>
            <div class="arc-inner" id="arcInner"></div>
            <div class="core-dot" id="coreDot"></div>
        </div>

        <div class="shard-container" id="shardField"></div>
    </div>

    <div class="device-panel">
        <div class="matrix" id="pad-matrix">
            </div>
        
        <div class="fader-module">
            <input type="range" id="sizeFader" min="0" max="100" value="0">
        </div>
    </div>

    <script>
        const fader = document.getElementById('sizeFader');
        const artRig = document.getElementById('artRig');
        const chH = document.getElementById('chH');
        const chV = document.getElementById('chV');
        const ovalMain = document.getElementById('ovalMain');
        const arcInner = document.getElementById('arcInner');
        const coreDot = document.getElementById('coreDot');
        
        const shardField = document.getElementById('shardField');
        const strobe = document.getElementById('strobe');
        const matrix = document.getElementById('pad-matrix');

        const NUM_SHARDS = 45;
        const SHARDS = [];

        function initDevice() {
            const NUM_PADS = 16; 
            
            const activeActions = [
                { text: "LOG IN", act: () => alert("AUTH_SEQ_INIT") },
                { text: "INFO", act: () => alert("SYS_DATA_READ") },
                { text: "CONTACT", act: () => alert("UPLINK_ESTAB") }
            ];
            
            let activePlaced = 0;

            for(let i = 0; i < NUM_PADS; i++) {
                const pad = document.createElement('div');
                pad.className = 'pad';
                
                // Randomly assign the 3 functional keys towards the bottom
                if (i >= NUM_PADS - 6 && activePlaced < 3 && Math.random() > 0.3) {
                    pad.classList.add('active');
                    pad.innerText = activeActions[activePlaced].text;
                    pad.addEventListener('touchstart', (e) => {
                        e.preventDefault(); 
                        activeActions[activePlaced].act();
                    });
                    pad.onclick = activeActions[activePlaced].act;
                    activePlaced++;
                } else {
                    const symbols = ["+", "-", "·", "::", "||", "x", ""];
                    pad.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                }
                matrix.appendChild(pad);
            }
            
            while(activePlaced < 3) {
                const pad = document.createElement('div');
                pad.className = 'pad active';
                pad.innerText = activeActions[activePlaced].text;
                pad.onclick = activeActions[activePlaced].act;
                pad.addEventListener('touchstart', (e) => { e.preventDefault(); activeActions[activePlaced].act(); });
                matrix.appendChild(pad);
                activePlaced++;
            }
        }

        function initArt() {
            for (let i = 0; i < NUM_SHARDS; i++) {
                const shard = document.createElement('div');
                shard.className = 'shard';
                
                const isLine = Math.random() > 0.6;
                const w = isLine ? (Math.random() * 3 + 1) : (Math.random() * 80 + 10);
                const h = isLine ? (Math.random() * 200 + 50) : (Math.random() * 80 + 10);
                
                shard.style.width = `${w}px`;
                shard.style.height = `${h}px`;
                
                shard.dataset.angle = Math.random() * Math.PI * 2;
                shard.dataset.dist = Math.random() * 20 + 5; 
                shard.dataset.rot = Math.random() * 360;
                
                shardField.appendChild(shard);
                SHARDS.push(shard);
            }
        }

        function updateArtPhysics() {
            const val = parseInt(fader.value);
            const norm = val / 100;

            // 1. Crosshairs expanding
            chV.style.height = `${norm * 150}vh`;
            chH.style.width = `${norm * 150}vw`;
            const thickness = val === 100 ? 12 : (2 + norm * 5);
            chV.style.width = `${thickness}px`;
            chH.style.height = `${thickness}px`;

            // 2. Logo Main Oval shaping
            ovalMain.style.width = `${norm * 85}vw`;
            ovalMain.style.height = `${norm * 35}vw`;
            ovalMain.style.opacity = norm > 0.05 ? Math.min(1, norm * 2.5) : 0;
            
            // 3. Inner Arcs
            arcInner.style.width = `${norm * 50}vw`;
            arcInner.style.height = `${norm * 35}vw`;
            arcInner.style.opacity = norm > 0.1 ? Math.min(1, (norm - 0.1) * 3) : 0;

            // 4. Central Core Pupil
            const coreSize = (norm * 12) + (norm > 0.85 ? Math.random() * 4 : 0);
            coreDot.style.width = `${coreSize}vw`;
            coreDot.style.height = `${coreSize}vw`;
            coreDot.style.opacity = norm > 0.15 ? 1 : 0;

            // 5. Rig Distortion at high fader values
            if (norm > 0.6) {
                const rot = (norm - 0.6) * 30; 
                const jitterX = (Math.random() - 0.5) * (norm - 0.6) * 15;
                const jitterY = (Math.random() - 0.5) * (norm - 0.6) * 15;
                artRig.style.transform = `translate(calc(-50% + ${jitterX}px), calc(-50% + ${jitterY}px)) rotate(${rot}deg)`;
            } else {
                artRig.style.transform = `translate(-50%, -50%) rotate(0deg)`;
            }

            // 6. Orbital Shard Explosion (following an elliptical path)
            const activeThreshold = Math.floor(norm * NUM_SHARDS);
            SHARDS.forEach((shard, i) => {
                if (i < activeThreshold) {
                    shard.style.opacity = (Math.random() * 0.5 + 0.1) * norm;
                    const expandX = Math.cos(shard.dataset.angle) * (parseFloat(shard.dataset.dist) + norm * 45);
                    const expandY = Math.sin(shard.dataset.angle) * (parseFloat(shard.dataset.dist) + norm * 15);
                    const r = parseFloat(shard.dataset.rot) + (norm * 270);
                    shard.style.transform = `translate(${expandX}vw, ${expandY}vw) rotate(${r}deg) scale(${norm * 2 + 0.5})`;
                } else {
                    shard.style.opacity = 0;
                    shard.style.transform = `translate(0,0) scale(0)`;
                }
            });

            // 7. Strobe Chaos
            if (norm > 0.88) {
                const flicker = Math.random() > 0.4 ? (norm - 0.8) * 5 : 0;
                strobe.style.opacity = flicker;
                document.getElementById('voidSpace').style.backgroundColor = Math.random() > 0.85 ? '#0c0c0c' : '#000';
            } else {
                strobe.style.opacity = 0;
                document.getElementById('voidSpace').style.backgroundColor = '#000';
            }
        }

        // Initialize UI & Canvas
        initDevice();
        initArt();
        
        // Fader Control Binding
        fader.addEventListener('input', updateArtPhysics);
        updateArtPhysics();

        // Screen Swipe controls for iOS
        let touchStartY = 0;
        const voidArea = document.getElementById('voidSpace');
        
        voidArea.addEventListener('touchstart', e => {
            touchStartY = e.touches[0].clientY;
        }, {passive: true});

        voidArea.addEventListener('touchmove', e => {
            let touchEndY = e.touches[0].clientY;
            let diff = touchStartY - touchEndY;
            
            if (Math.abs(diff) > 4) {
                let newVal = parseInt(fader.value) + (diff * 0.5);
                newVal = Math.max(0, Math.min(100, newVal));
                fader.value = newVal;
                updateArtPhysics();
                touchStartY = touchEndY; 
            }
        }, {passive: true});
        
    </script>
</body>
</html>
